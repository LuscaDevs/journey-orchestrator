openapi: 3.0.3
info:
  title: Journey Orchestrator API
  description: |
    Platform service responsible for orchestrating configurable product journeys
    using a state machine model.

    The service is business-agnostic and executes journey definitions configured
    in the platform.

  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Journey Definitions
  - name: Journey Instances

paths:
  /journey-definitions:
    post:
      tags:
        - Journey Definitions
      summary: Create a new journey definition
      operationId: createJourneyDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JourneyDefinition"
      responses:
        "201":
          description: Journey definition created

  /journey-definitions/{journeyCode}/{version}:
    get:
      tags:
        - Journey Definitions
      summary: Get a journey definition
      operationId: getJourneyDefinition
      parameters:
        - name: journeyCode
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Journey definition found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyDefinition"

  /journey-instances:
    post:
      tags:
        - Journey Instances
      summary: Start a new journey instance
      operationId: createJourneyInstance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJourneyInstanceRequest"
      responses:
        "201":
          description: Journey instance created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyInstance"

  /journey-instances/{instanceId}:
    get:
      tags:
        - Journey Instances
      summary: Get journey instance state
      operationId: getJourneyInstance
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Journey instance found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyInstance"

  /journey-instances/{instanceId}/events:
    post:
      tags:
        - Journey Instances
      summary: Send event to a journey instance
      operationId: sendEvent
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequest"
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyInstance"

components:
  schemas:
    JourneyDefinition:
      type: object
      required:
        - journeyCode
        - version
        - initialState
        - states
        - transitions
      properties:
        journeyCode:
          type: string
        version:
          type: string
        initialState:
          type: string
        states:
          type: array
          items:
            $ref: "#/components/schemas/State"
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/Transition"
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    State:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - INITIAL
            - INTERMEDIATE
            - FINAL

    Transition:
      type: object
      required:
        - source
        - event
        - target
      properties:
        source:
          type: string
        event:
          type: string
        target:
          type: string

    CreateJourneyInstanceRequest:
      type: object
      required:
        - journeyCode
        - version
      properties:
        journeyCode:
          type: string
        version:
          type: string
        context:
          type: object
          additionalProperties: true

    JourneyInstance:
      type: object
      properties:
        instanceId:
          type: string
        journeyCode:
          type: string
        version:
          type: string
        currentState:
          type: string
        status:
          type: string
        context:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EventRequest:
      type: object
      required:
        - event
      properties:
        event:
          type: string
