openapi: 3.0.3
info:
  title: Journey Orchestrator API
  description: >
    Platform service responsible for executing configurable journeys using a
    state machine model. The service is business-agnostic and manages journey
    definitions and journey instances driven by events.
  version: 1.0.0

servers:
  - url: http://localhost:8080

tags:
  - name: Journey Definitions
  - name: Journey Instances

paths:

  /journeys:
    post:
      tags:
        - Journey Definitions
      summary: Create a new journey definition
      operationId: createJourneyDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJourneyDefinitionRequest"
      responses:
        "201":
          description: Journey definition created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyDefinitionResponse"

    get:
      tags:
        - Journey Definitions
      summary: List all journey definitions
      operationId: listJourneyDefinitions
      responses:
        "200":
          description: List of journey definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JourneyDefinitionResponse"

  /journeys/{journeyCode}:
    get:
      tags:
        - Journey Definitions
      summary: Get all versions of a journey definition
      operationId: getJourneyDefinitionsByCode
      parameters:
        - name: journeyCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Journey definitions found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JourneyDefinitionResponse"

  /journey-instances:
    post:
      tags:
        - Journey Instances
      summary: Start a new journey instance
      operationId: createJourneyInstance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJourneyInstanceRequest"
      responses:
        "201":
          description: Journey instance created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyInstanceResponse"

  /journey-instances/{instanceId}:
    get:
      tags:
        - Journey Instances
      summary: Get journey instance by id
      operationId: getJourneyInstance
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Journey instance found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyInstanceResponse"

  /journey-instances/{instanceId}/events:
    post:
      tags:
        - Journey Instances
      summary: Send event to a journey instance
      operationId: sendEvent
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequest"
      responses:
        "200":
          description: Event processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JourneyInstanceResponse"

components:

  schemas:

    CreateJourneyDefinitionRequest:
      type: object
      required:
        - journeyCode
        - name
        - version
        - states
        - transitions
      properties:
        journeyCode:
          type: string
        name:
          type: string
        version:
          type: integer
        states:
          type: array
          items:
            $ref: "#/components/schemas/State"
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/TransitionRequest"

    JourneyDefinitionResponse:
      type: object
      properties:
        id:
          type: string
        journeyCode:
          type: string
        name:
          type: string
        version:
          type: integer
        states:
          type: array
          items:
            $ref: "#/components/schemas/State"
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/TransitionResponse"
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    State:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/StateType"

    StateType:
      type: string
      enum:
        - INITIAL
        - NORMAL
        - FINAL

    TransitionRequest:
      type: object
      required:
        - source
        - event
        - target
      properties:
        source:
          type: string
        event:
          type: string
        target:
          type: string

    TransitionResponse:
      type: object
      properties:
        source:
          type: string
        event:
          type: string
        target:
          type: string

    CreateJourneyInstanceRequest:
      type: object
      required:
        - journeyCode
        - version
      properties:
        journeyCode:
          type: string
        version:
          type: integer
        context:
          type: object
          additionalProperties: true

    EventRequest:
      type: object
      required:
        - event
      properties:
        event:
          type: string
        payload:
          type: object
          additionalProperties: true

    JourneyInstanceResponse:
      type: object
      properties:
        instanceId:
          type: string
        journeyCode:
          type: string
        version:
          type: integer
        currentState:
          type: string
        status:
          $ref: "#/components/schemas/JourneyStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    JourneyStatus:
      type: string
      enum:
        - RUNNING
        - COMPLETED
        - FAILED
        - CANCELLED