# Error Response Contracts

# RFC 9457 ProblemDetail Base Structure
problemDetail:
  type: object
  required:
    - type
    - title
    - status
    - detail
    - instance
  properties:
    type:
      type: string
      format: uri
      description: "URI reference that identifies the problem type"
      example: "https://api.journey-orchestrator.com/errors/journey_001"
    title:
      type: string
      description: "Short, human-readable summary of the problem type"
      example: "Journey definition not found"
    status:
      type: integer
      format: int32
      description: "HTTP status code generated by the origin server"
      example: 404
    detail:
      type: string
      description: "Human-readable explanation specific to this occurrence"
      example: "Journey definition with ID 'abc123' not found"
    instance:
      type: string
      format: uri
      description: "URI reference that identifies the specific occurrence of the problem"
      example: "/api/journeys/definitions/abc123"
    errorCode:
      type: string
      description: "Application-specific error code for programmatic handling"
      example: "JOURNEY_001"
    timestamp:
      type: string
      format: date-time
      description: "Timestamp when the error occurred"
      example: "2025-03-25T15:30:00Z"
    path:
      type: string
      description: "Request path that generated the error"
      example: "/api/journeys/definitions/abc123"

# Standard Error Response (extends ProblemDetail)
errorResponse:
  allOf:
    - $ref: '#/problemDetail'
    - type: object
      required:
        - errorCode
        - timestamp
        - path
      properties:
        additionalContext:
          type: object
          description: "Additional context information for debugging"
          example:
            journeyDefinitionId: "abc123"
            userId: "user123"

# Validation Error Response
validationErrorResponse:
  allOf:
    - $ref: '#/problemDetail'
    - type: object
      required:
        - errorCode
        - timestamp
        - path
        - fieldErrors
      properties:
        fieldCount:
          type: integer
          description: "Number of field validation errors"
          example: 2
        fieldErrors:
          type: array
          items:
            $ref: '#/fieldValidationError'

# Field Validation Error
fieldValidationError:
  type: object
  required:
    - field
    - errorCode
    - message
  properties:
    field:
      type: string
      description: "Name of the field that failed validation"
      example: "journeyDefinition.name"
    errorCode:
      type: string
      description: "Validation-specific error code"
      example: "VALIDATION_003"
    message:
      type: string
      description: "Human-readable validation error message"
      example: "Journey definition name is required"
    rejectedValue:
      description: "Value that was rejected by validation"
      example: null

# Error Examples
examples:
  journeyDefinitionNotFound:
    summary: "Journey definition not found"
    value:
      type: "https://api.journey-orchestrator.com/errors/journey_001"
      title: "Journey definition not found"
      status: 404
      detail: "Journey definition with ID 'abc123' not found"
      instance: "/api/journeys/definitions/abc123"
      errorCode: "JOURNEY_001"
      timestamp: "2025-03-25T15:30:00Z"
      path: "/api/journeys/definitions/abc123"
      additionalContext:
        journeyDefinitionId: "abc123"

  invalidStateTransition:
    summary: "Invalid state transition"
    value:
      type: "https://api.journey-orchestrator.com/errors/state_001"
      title: "Invalid state transition"
      status: 422
      detail: "Cannot transition from 'STARTED' to 'COMPLETED' for journey instance 'inst456'"
      instance: "/api/journeys/instances/inst456/transitions"
      errorCode: "STATE_001"
      timestamp: "2025-03-25T15:30:00Z"
      path: "/api/journeys/instances/inst456/transitions"
      additionalContext:
        journeyInstanceId: "inst456"
        currentState: "STARTED"
        targetState: "COMPLETED"

  validationError:
    summary: "Request validation failed"
    value:
      type: "https://api.journey-orchestrator.com/errors/validation_001"
      title: "Validation Failed"
      status: 400
      detail: "Request validation failed"
      instance: "/api/journeys/definitions"
      errorCode: "VALIDATION_001"
      timestamp: "2025-03-25T15:30:00Z"
      path: "/api/journeys/definitions"
      fieldCount: 2
      fieldErrors:
        - field: "journeyDefinition.name"
          errorCode: "VALIDATION_003"
          message: "Journey definition name is required"
          rejectedValue: null
        - field: "journeyDefinition.version"
          errorCode: "VALIDATION_003"
          message: "Journey definition version is required"
          rejectedValue: ""

  internalServerError:
    summary: "Internal server error"
    value:
      type: "https://api.journey-orchestrator.com/errors/system_001"
      title: "Internal server error"
      status: 500
      detail: "An unexpected error occurred while processing your request"
      instance: "/api/journeys/instances"
      errorCode: "SYSTEM_001"
      timestamp: "2025-03-25T15:30:00Z"
      path: "/api/journeys/instances"
