# Testcontainers Configuration for Journey Orchestrator E2E Tests
# Optimizes container reuse and resource management

# Enable container reuse for better performance
testcontainers.reuse.enable=true

# Configure MongoDB container reuse
ryuk.container.enabled=true
ryuk.container.privileged=true

# Docker configuration
docker.client.strategy=org.testcontainers.dockerclient.EnvironmentAwareDockerClientStrategy
docker.host=localhost
docker.api.version=1.41

# Resource limits for containers
testcontainers.resource.memory.limit=512m
testcontainers.resource.cpu.limit=1

# Timeout configurations
testcontainers.startup.timeout=PT60S
testcontainers.shutdown.timeout=PT30S

# Network configuration
testcontainers.network.mode=bridge

# Logging configuration
testcontainers.logging.level=INFO
testcontainers.logging.filter=org.testcontainers

# Parallel execution support
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=concurrent
junit.jupiter.execution.parallel.mode.classes.default=concurrent
