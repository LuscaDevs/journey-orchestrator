# JUnit Platform Configuration for Journey Orchestrator E2E Tests
# Configured for safe parallel execution with proper resource isolation

# Parallel execution configuration - DISABLED for E2E tests due to Testcontainers conflicts
junit.jupiter.execution.parallel.enabled=false
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=same_thread
junit.jupiter.execution.parallel.mode.methods.default=same_thread

# Test execution order
junit.jupiter.testmethod.order.default=org.junit.jupiter.api.MethodOrderer$OrderAnnotation
junit.jupiter.testclass.order.default=org.junit.jupiter.api.ClassOrderer$OrderAnnotation

# Display name configuration
junit.jupiter.displayname.generator.default=org.junit.jupiter.api.DisplayNameGenerator$ReplaceUnderscores

# Condition configuration
junit.jupiter.conditions.deactivate=org.junit.jupiter.api.DisabledCondition

# Extension configuration
junit.jupiter.extensions.autodetection.enabled=true

# Resource management - for potential future parallel execution
junit.jupiter.execution.parallel.resource.locks.core.default=semaphore
junit.jupiter.execution.parallel.resource.locks.core.capacity=1

# Timeout configuration
junit.jupiter.execution.timeout.default=120s
junit.jupiter.execution.timeout.testable.method.default=60s
junit.jupiter.execution.timeout.testable.class.default=180s

# Lifecycle configuration
junit.jupiter.execution.parallel.lifecycle.mode=same_thread
