spring:
  profiles:
    active: dev
  
  # SpringDoc OpenAPI configuration
  springdoc:
    api-docs:
      path: /api-docs
      enabled: true
    swagger-ui:
      path: /swagger-ui.html
      enabled: true
      try-it-out-enabled: true
      operations-sorter: method
      tags-sorter: alpha
      doc-expansion: none
      disable-swagger-default-url: true
      display-request-duration: true
      default-models-expand-depth: 1
      default-model-expand-depth: 1
    show-actuator: true
  
  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb://localhost:27017/journey-orchestrator
      database: journey-orchestrator
      auto-index-creation: true

# Application-specific configuration
journey-orchestrator:
  persistence:
    mongodb:
      connection-timeout: 5000
      max-pool-size: 20
      min-pool-size: 5
      auto-index-creation: true
      uri: mongodb://localhost:27017/journey-orchestrator
      database: journey-orchestrator

logging:
  level:
    root: INFO
    com.luscadevs.journeyorchestrator: DEBUG

    org.springframework: INFO
    org.springframework.web: INFO

    org.springframework.data.mongodb: WARN
    org.springframework.data.mongodb.core: WARN
    org.springframework.data.mongodb.repository: WARN
    org.mongodb.driver: WARN
